<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    
    <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="container">
    <div class="search-bar">
      <h1>Weatherly </h1>
      <input type="text" id="city" placeholder="Enter city name">
      <button id="btn" onclick="getweather(city.value)">Search</button>
    </div>
    
    <div class="weather">
      <h1>Weather Details </h1>
      <h5 id="city-name"></h5>
      <h2 id="temp"></h2>
      <p id="condition"></p>
      <div class="weather-details">
        <div class="card" id="wind"> wind</div>
        <div class="card" id="humidity"> Humidity </div>
        <div class="card" id="visibility">visibility</div>
        <div class="card" id="pressure">pressure </div>
      </div>
    </div>
    
    <div class="map">
      <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d497630.7919552902!2d77.29235285876072!3d12.988438494883292!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3bae1670c9b44e6d%3A0xf8dfc3e8517e4fe0!2sBengaluru%2C%20Karnataka!5e0!3m2!1sen!2sin!4v1780938083808!5m2!1sen!2sin" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
    </div>
    
  </div>
    <script src="script.js"></script>
</body>
</html>
